{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %} 

{% block main %}
    <div style="text-align: center;">
        <h1>Register</h1>
        <p>Create your account below:</p>
    </div>
    <form action="/register" method="post" class="p-4 bg-light mx-auto rounded-3 shadow=sm" style="max-width: 600px;">
        <div class="form-group">
            <label class="mb-1" for="username2">Username:</label>
            <input autofocus autocomplete="off" class="form-control mb-2" id="username2" name="username" placeholder="Username" type="text">
        </div>
        <div class="form-group">
            <label class="mb-1" for="password2">Password:</label>
            <input autocomplete="off" class="form-control mb-2" type="text" id="password2" name="password" placeholder="Password">
        </div>
        <div class="form-group">
            <label class="mb-1" for="passwordre">Re-Enter Password:</label>
            <input autocomplete="off" class="form-control mb-5" type="text" id="passwordre" name="confirm" placeholder="Re-Enter Password">
        </div>
        <button class="btn btn-primary form-control" type="submit">Enter</button>
    </form>
    
{% endblock %}
