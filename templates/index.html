{% extends "layout.html" %}

{% block title %}
    McRonald SIM
{% endblock %}
{% block script %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll(".input").forEach(input => {
                const hint = input.parentElement.querySelector(".hint");

                input.addEventListener("focus", () => {
                    hint.classList.remove("hidden");
                });

                input.addEventListener("blur", () => {
                    hint.classList.add("hidden");
                });
            });
        });
    </script>
{% endblock %}
{% block main %}
    <form action="/" method="post" class="d-flex flex-wrap justify-content-center align-items-center gap-3 p-4 bg-light rounded-3 shadow-sm">
        <div class="form-group">
            <label>Location:</label>
            <Select class="form-control" name="location">
                <option>Regional</option>
                <option>Metro</option>
            </Select>
        </div>
        <div class="form-group">
            <label>Time:</label>
            <select class="form-control" name="time">
                <option>Morning</option>
                <option>PeakHour</option>
                <option>Night</option>
            </select>
        </div>
        <div class="form-group">
            <label>Counters:</label>
            <div class="input-wrapper form-control">
                <input autofocus autocomplete="off" class="input" name="counter" placeholder="counter amount" type="number">
                <div id = "counter_hint" class="hidden hint">Counter must be at least 1</div>
            </div>
        </div>
        <div class="form-group">
            <label>Staff:</label>
            <div class="input-wrapper form-control">
                <input autocomplete="off" class="input" name="staff" placeholder="stuff amount" type="number">
                <div id = "staff_hint" class="hidden hint">Staff must be at least 1</div>
            </div>
        </div>
        <div class="form-group">
            <label>Duration:</label>
            <div class="input-wrapper form-control">
                <input autocomplete="off" class="input" name="duration" placeholder="run duration" type="number">
                <div id = "dur_hint" class="hidden hint">Duration must be at least 60min long</div>
            </div>
        </div>
        <div class="form-group">
            <label>Cycle:</label>
            <div class="input-wrapper form-control">
                <input autocomplete="off" class="input"name="cycle" placeholder="cycle" type="number">
                <div id = "cyc_hint" class="hidden hint">Cycle must be at least 1</div>
            </div>
        </div>
          
        <div class="form-group">
            <label></label>
            <div class="form-control">
                <button class="btn btn-primary" type="submit" style="width: 120px;">Run</button>
            </div>
        </div>
    </form>
    <div style="text-align: center; margin: 50px;">
        <a href="meme.gif">
            <img src="https://github.com/d5op/cs50-homepage/blob/main/spongebob.gif?raw=true" alt="Funny GIF" class="gif" style="width: 700px; height: 500px;">
        </a>
    </div>
{% endblock %}
