{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <header style="text-align: center;">
        <h1>Login</h1>
        <p class="mb-3">Welcome back! Please enter your details below.</p>
    </header>
    <form action="/login" method="post" class="p-4 bg-light mx-auto rounded-3 shadow=sm" style="max-width: 600px;">
        <div class="form-group">
            <label class="mb-1 input_text" for="usernamel">Username:</label>
            <input autocomplete="off" autofocus class="form-control mb-2" id="usernamel" name="username" placeholder="Username" type="text">
        </div>
        <div class="form-group">  
            <label class="mb-1" for="passwordl">Password:</label> 
            <input class="form-control mb-5" id="password1" name="password" placeholder="Password" type="password">
        </div>
        <button class="btn btn-primary form-control" type="submit">Log In</button>
        <div>
            <a class="btn btn-link form-control" href="/register">Don't have an account, click to register</a> 
        </div>
    </form>
{% endblock %}
